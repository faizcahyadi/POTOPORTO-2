# ============================================
# Application
# ============================================
spring.application.name=PhotographyPortfolio
server.port=8080

# ============================================
# Datasource (Supabase/PostgreSQL)
# ============================================
# Isi kredensial Supabase-mu di sini, atau (lebih aman) set sebagai environment
# variable dengan nama yang sama: DB_URL, DB_USERNAME, DB_PASSWORD.
# Ambil dari: Supabase Dashboard > Project Settings > Database > Connection string (mode: Session pooler / Transaction pooler direkomendasikan untuk deploy).
spring.datasource.url=${DB_URL:jdbc:postgresql://aws-0-ap-southeast-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres.sitomtkhjrkltkmwikmm}
spring.datasource.password=${DB_PASSWORD:ggyvnxydGDMl4YYY}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=true

# ============================================
# Thymeleaf
# ============================================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ============================================
# Devtools
# ============================================
spring.devtools.restart.enabled=true

# ============================================
# Logging
# ============================================
logging.level.org.springframework.security=INFO
