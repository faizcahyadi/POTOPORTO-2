<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/fragments :: pageHead('Daftar Foto')}"></head>
<body>
<nav th:replace="~{fragments/fragments :: navbar}"></nav>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <div>
            <h2 class="mb-1 fw-bold">Galeri Foto</h2>
            <p class="text-muted mb-0">Jelajahi koleksi foto photography portfolio</p>
        </div>
    </div>

    <div th:replace="~{fragments/fragments :: alerts}"></div>

    <form th:action="@{/foto/list}" method="get" class="mb-4">
        <div class="input-group" style="max-width: 400px;">
            <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Cari judul foto...">
            <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(fotoList)}" class="text-center text-muted py-5">
        <i class="bi bi-images display-4 d-block mb-2"></i>
        Belum ada foto yang tersedia.
    </div>

    <div class="row g-4 gallery-grid">
        <div class="col-6 col-md-4 col-lg-3" th:each="f : ${fotoList}">
            <a th:href="@{/foto/detail/{id}(id=${f.id})}" class="text-decoration-none text-dark">
                <div class="card gallery-card border-0 shadow-sm h-100">
                    <img th:src="@{'/images/' + ${f.namaFile}}" onerror="this.src='/images/placeholder.jpg'" class="card-img-top gallery-img" alt="foto">
                    <div class="card-body">
                        <h6 class="card-title mb-1 text-truncate" th:text="${f.judul}">Judul</h6>
                        <span class="badge bg-info-subtle text-info" th:text="${f.kategori.namaKategori}">Kategori</span>
                    </div>
                </div>
            </a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/fragments :: scripts}"></div>
</body>
</html>
