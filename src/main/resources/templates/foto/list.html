<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/fragments :: pageHead('Data Foto')}"></head>
<body>
<nav th:replace="~{fragments/fragments :: navbar}"></nav>
<div class="app-container">
    <div th:replace="~{fragments/fragments :: sidebar('foto')}"></div>
    <main class="app-content">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <div>
                <h2 class="mb-1 fw-bold">Data Foto</h2>
                <p class="text-muted mb-0">Kelola koleksi foto portfolio</p>
            </div>
            <a th:href="@{/admin/foto/add}" class="btn btn-primary">
                <i class="bi bi-plus-lg me-1"></i>Tambah Foto
            </a>
        </div>

        <div th:replace="~{fragments/fragments :: alerts}"></div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <form th:action="@{/admin/foto/list}" method="get" class="mb-3">
                    <div class="input-group" style="max-width: 350px;">
                        <input type="text" name="keyword" th:value="${keyword}" class="form-control" placeholder="Cari judul foto...">
                        <button class="btn btn-outline-secondary" type="submit"><i class="bi bi-search"></i></button>
                    </div>
                </form>

                <div class="table-responsive">
                    <table class="table table-hover align-middle paginated-table" data-page-size="5">
                        <thead class="table-light">
                        <tr>
                            <th>#</th>
                            <th>Gambar</th>
                            <th>Judul</th>
                            <th>Kategori</th>
                            <th>Kamera</th>
                            <th>Lokasi</th>
                            <th>Uploader</th>
                            <th>Tanggal</th>
                            <th class="text-end">Aksi</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(fotoList)}">
                            <td colspan="9" class="text-center text-muted py-4">Belum ada data foto</td>
                        </tr>
                        <tr th:each="f, iter : ${fotoList}">
                            <td th:text="${iter.count}">1</td>
                            <td>
                                <img th:src="@{'/images/' + ${f.namaFile}}" onerror="this.src='/images/placeholder.jpg'" class="thumb-img" alt="foto">
                            </td>
                            <td th:text="${f.judul}">Judul</td>
                            <td><span class="badge bg-info-subtle text-info" th:text="${f.kategori.namaKategori}">Kategori</span></td>
                            <td th:text="${f.kamera.namaKamera}">Kamera</td>
                            <td th:text="${f.lokasi.namaLokasi}">Lokasi</td>
                            <td th:text="${f.user.nama}">User</td>
                            <td th:text="${#temporals.format(f.tanggalUpload, 'dd-MM-yyyy')}">Tanggal</td>
                            <td class="text-end">
                                <a th:href="@{/admin/foto/view/{id}(id=${f.id})}" class="btn btn-sm btn-outline-info" title="Lihat"><i class="bi bi-eye"></i></a>
                                <a th:href="@{/admin/foto/edit/{id}(id=${f.id})}" class="btn btn-sm btn-outline-warning" title="Edit"><i class="bi bi-pencil"></i></a>
                                <a th:href="@{/admin/foto/delete/{id}(id=${f.id})}" class="btn btn-sm btn-outline-danger btn-delete" title="Hapus"><i class="bi bi-trash"></i></a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <nav class="pagination-controls mt-3"></nav>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/fragments :: scripts}"></div>
</body>
</html>
