<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/fragments :: pageHead('Detail Foto')}"></head>
<body>
<nav th:replace="~{fragments/fragments :: navbar}"></nav>
<div class="app-container">
    <div th:replace="~{fragments/fragments :: sidebar('foto')}"></div>
    <main class="app-content">
        <h2 class="mb-1 fw-bold">Detail Foto</h2>
        <p class="text-muted mb-4">Informasi lengkap data foto</p>

        <div class="card border-0 shadow-sm" style="max-width: 750px;">
            <div class="row g-0">
                <div class="col-md-5">
                    <img th:src="@{'/images/' + ${foto.namaFile}}" onerror="this.src='/images/placeholder.jpg'" class="detail-img rounded-start w-100 h-100" alt="foto">
                </div>
                <div class="col-md-7">
                    <div class="card-body">
                        <table class="table table-borderless mb-0">
                            <tr><th class="w-25">Judul</th><td th:text="${foto.judul}">-</td></tr>
                            <tr><th>Deskripsi</th><td th:text="${foto.deskripsi}">-</td></tr>
                            <tr><th>Tanggal Upload</th><td th:text="${#temporals.format(foto.tanggalUpload, 'dd-MM-yyyy')}">-</td></tr>
                            <tr><th>Kamera</th><td th:text="${foto.kamera.namaKamera}">-</td></tr>
                            <tr><th>Lokasi</th><td th:text="${foto.lokasi.namaLokasi} + ', ' + ${foto.lokasi.kota}">-</td></tr>
                            <tr><th>Kategori</th><td th:text="${foto.kategori.namaKategori}">-</td></tr>
                            <tr><th>Diunggah oleh</th><td th:text="${foto.user.nama}">-</td></tr>
                        </table>
                        <a th:href="@{/admin/foto/list}" class="btn btn-outline-secondary mt-3">
                            <i class="bi bi-arrow-left me-1"></i>Kembali
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/fragments :: scripts}"></div>
</body>
</html>
