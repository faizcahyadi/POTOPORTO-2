<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/fragments :: pageHead(${mode == 'add'} ? 'Tambah Kamera' : 'Edit Kamera')}"></head>
<body>
<nav th:replace="~{fragments/fragments :: navbar}"></nav>
<div class="app-container">
    <div th:replace="~{fragments/fragments :: sidebar('kamera')}"></div>
    <main class="app-content">
        <h2 class="mb-1 fw-bold" th:text="${mode == 'add'} ? 'Tambah Kamera' : 'Edit Kamera'">Form Kamera</h2>
        <p class="text-muted mb-4">Lengkapi form berikut</p>

        <div class="card border-0 shadow-sm" style="max-width: 600px;">
            <div class="card-body">
                <form th:action="@{/admin/kamera/save}" th:object="${kamera}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Nama Kamera</label>
                        <input type="text" class="form-control" th:field="*{namaKamera}" placeholder="Contoh: Canon EOS R6">
                        <div class="text-danger small" th:if="${#fields.hasErrors('namaKamera')}" th:errors="*{namaKamera}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Merk</label>
                        <input type="text" class="form-control" th:field="*{merk}" placeholder="Contoh: Canon">
                        <div class="text-danger small" th:if="${#fields.hasErrors('merk')}" th:errors="*{merk}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Deskripsi</label>
                        <textarea class="form-control" th:field="*{deskripsi}" rows="3" placeholder="Deskripsi singkat kamera"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Simpan</button>
                        <a th:href="@{/admin/kamera/list}" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/fragments :: scripts}"></div>
</body>
</html>
