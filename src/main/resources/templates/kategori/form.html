<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/fragments :: pageHead(${mode == 'add'} ? 'Tambah Kategori' : 'Edit Kategori')}"></head>
<body>
<nav th:replace="~{fragments/fragments :: navbar}"></nav>
<div class="app-container">
    <div th:replace="~{fragments/fragments :: sidebar('kategori')}"></div>
    <main class="app-content">
        <h2 class="mb-1 fw-bold" th:text="${mode == 'add'} ? 'Tambah Kategori' : 'Edit Kategori'">Form Kategori</h2>
        <p class="text-muted mb-4">Lengkapi form berikut</p>

        <div class="card border-0 shadow-sm" style="max-width: 600px;">
            <div class="card-body">
                <form th:action="@{/admin/kategori/save}" th:object="${kategori}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Nama Kategori</label>
                        <input type="text" class="form-control" th:field="*{namaKategori}" placeholder="Contoh: Wedding">
                        <div class="text-danger small" th:if="${#fields.hasErrors('namaKategori')}" th:errors="*{namaKategori}"></div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Simpan</button>
                        <a th:href="@{/admin/kategori/list}" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/fragments :: scripts}"></div>
</body>
</html>
