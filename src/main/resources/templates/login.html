<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Photography Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body d-flex align-items-center justify-content-center min-vh-100">
<div class="login-card shadow-lg">
    <div class="text-center mb-4">
        <i class="bi bi-camera-fill login-icon"></i>
        <h3 class="fw-bold mt-2 mb-0">Photography Portfolio</h3>
        <p class="text-muted small">Silakan login untuk melanjutkan</p>
    </div>

    <div th:if="${registerSuccess}" class="alert alert-success py-2">
        <i class="bi bi-check-circle-fill me-1"></i>
        <span th:text="${registerSuccess}">Pendaftaran berhasil!</span>
    </div>
    <div th:if="${param.error}" class="alert alert-danger py-2">
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
        Username atau password salah.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2">
        <i class="bi bi-check-circle-fill me-1"></i>
        Anda berhasil logout.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">Username / Email</label>
            <input type="text" class="form-control" id="username" name="username" placeholder="Masukkan username atau email" required autofocus>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Masukkan password" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i> Login
        </button>
    </form>

    <p class="text-center small mt-3 mb-0">
        Belum punya akun? <a th:href="@{/register}" class="text-decoration-none">Daftar di sini</a>
    </p>

    <hr>
    <div class="small text-muted">
        <p class="mb-1 fw-semibold">Akun demo:</p>
        <p class="mb-0">Admin: <code>admin</code> / <code>admin123</code></p>
        <p class="mb-0">User: <code>budi@example.com</code> / <code>user123</code></p>
    </div>
</div>
</body>
</html>
