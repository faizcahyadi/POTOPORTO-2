<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun - Photography Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="login-body d-flex align-items-center justify-content-center min-vh-100 py-4">
<div class="login-card shadow-lg">
    <div class="text-center mb-4">
        <i class="bi bi-camera-fill login-icon"></i>
        <h3 class="fw-bold mt-2 mb-0">Daftar Akun</h3>
        <p class="text-muted small">Buat akun User untuk melihat galeri foto</p>
    </div>

    <form th:action="@{/register/save}" th:object="${registerDto}" method="post">
        <div class="mb-3">
            <label class="form-label">Nama Lengkap</label>
            <input type="text" class="form-control" th:field="*{nama}" placeholder="Masukkan nama lengkap" autofocus>
            <div class="text-danger small" th:if="${#fields.hasErrors('nama')}" th:errors="*{nama}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" placeholder="nama@email.com">
            <div class="text-danger small" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" th:field="*{password}" placeholder="Minimal 6 karakter">
            <div class="text-danger small" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label">Konfirmasi Password</label>
            <input type="password" class="form-control" th:field="*{confirmPassword}" placeholder="Ulangi password">
            <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-plus-fill me-1"></i> Daftar
        </button>
    </form>

    <hr>
    <p class="text-center small mb-0">
        Sudah punya akun? <a th:href="@{/login}" class="text-decoration-none">Login di sini</a>
    </p>
</div>
</body>
</html>
