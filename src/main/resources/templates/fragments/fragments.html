<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <!-- ============== HEAD FRAGMENT ============== -->
    <th:block th:fragment="pageHead(title)">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title th:text="${title} + ' - Photography Portfolio'">Photography Portfolio</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </th:block>
</head>
<body>

<!-- ============== NAVBAR FRAGMENT ============== -->
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm">
    <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="#">
            <i class="bi bi-camera-fill me-2"></i>Photography Portfolio
        </a>
        <button class="navbar-toggler d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="d-flex align-items-center ms-auto">
            <span class="text-white-50 me-3 d-none d-sm-inline">
                <i class="bi bi-person-circle me-1"></i>
                <span sec:authentication="name">username</span>
                <span class="badge bg-light text-dark ms-1" sec:authorize="hasRole('ADMIN')">Admin</span>
                <span class="badge bg-info text-dark ms-1" sec:authorize="hasRole('USER')">User</span>
            </span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>Logout
                </button>
            </form>
        </div>
    </div>
</nav>

<!-- ============== SIDEBAR FRAGMENT (ADMIN) ============== -->
<div th:fragment="sidebar(active)" >
    <div class="offcanvas-lg offcanvas-start app-sidebar" tabindex="-1" id="sidebarOffcanvas">
        <div class="offcanvas-body p-0">
            <ul class="nav flex-column py-3">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'dashboard'} ? 'active'" th:href="@{/dashboard}">
                        <i class="bi bi-speedometer2 me-2"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'user'} ? 'active'" th:href="@{/admin/user/list}">
                        <i class="bi bi-people-fill me-2"></i>User
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'foto'} ? 'active'" th:href="@{/admin/foto/list}">
                        <i class="bi bi-images me-2"></i>Foto
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'kamera'} ? 'active'" th:href="@{/admin/kamera/list}">
                        <i class="bi bi-camera2 me-2"></i>Kamera
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'lokasi'} ? 'active'" th:href="@{/admin/lokasi/list}">
                        <i class="bi bi-geo-alt-fill me-2"></i>Lokasi
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${active == 'kategori'} ? 'active'" th:href="@{/admin/kategori/list}">
                        <i class="bi bi-tags-fill me-2"></i>Kategori
                    </a>
                </li>
                <li class="nav-item mt-3 border-top pt-3">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="nav-link btn btn-link text-danger w-100 text-start">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</div>

<!-- ============== ALERT FRAGMENT ============== -->
<div th:fragment="alerts">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}">Success</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- ============== SCRIPTS FRAGMENT ============== -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/script.js}"></script>
</th:block>

</body>
</html>
