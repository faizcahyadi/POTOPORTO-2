<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/fragments :: pageHead(${mode == 'add'} ? 'Tambah Lokasi' : 'Edit Lokasi')}"></head>
<body>
<nav th:replace="~{fragments/fragments :: navbar}"></nav>
<div class="app-container">
    <div th:replace="~{fragments/fragments :: sidebar('lokasi')}"></div>
    <main class="app-content">
        <h2 class="mb-1 fw-bold" th:text="${mode == 'add'} ? 'Tambah Lokasi' : 'Edit Lokasi'">Form Lokasi</h2>
        <p class="text-muted mb-4">Lengkapi form berikut</p>

        <div class="card border-0 shadow-sm" style="max-width: 600px;">
            <div class="card-body">
                <form th:action="@{/admin/lokasi/save}" th:object="${lokasi}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="mb-3">
                        <label class="form-label">Nama Lokasi</label>
                        <input type="text" class="form-control" th:field="*{namaLokasi}" placeholder="Contoh: Pantai Kuta">
                        <div class="text-danger small" th:if="${#fields.hasErrors('namaLokasi')}" th:errors="*{namaLokasi}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Kota</label>
                        <input type="text" class="form-control" th:field="*{kota}" placeholder="Contoh: Bali">
                        <div class="text-danger small" th:if="${#fields.hasErrors('kota')}" th:errors="*{kota}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Deskripsi</label>
                        <textarea class="form-control" th:field="*{deskripsi}" rows="3" placeholder="Deskripsi singkat lokasi"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Simpan</button>
                        <a th:href="@{/admin/lokasi/list}" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
<div th:replace="~{fragments/fragments :: scripts}"></div>
</body>
</html>
